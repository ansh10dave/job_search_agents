services:
  n8n:
    build: .
    container_name: n8n-job-agent
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Toronto
      - TZ=America/Toronto
      - NODES_EXCLUDE=[]
    volumes:
      - n8n_data:/home/node/.n8n
      - ./scripts:/scripts

volumes:
  n8n_data: